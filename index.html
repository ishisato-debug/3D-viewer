<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腹部臓器 3Dモデル</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        header {
            background: #2a2a2a;
            color: #fff;
            padding: 12px 16px;
            font-size: 15px;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }
        model-viewer {
            width: 100%;
            flex: 1;
            background-color: #2a2a2a;
            --progress-bar-color: #0066cc;
        }
        .hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-size: 12px;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <header>腹部臓器 3Dモデル</header>
    <model-viewer
        src="./abdominal_organ.glb"
        alt="腹部臓器の3Dモデル"
        camera-controls
        auto-rotate
        auto-rotate-delay="2000"
        rotation-per-second="20deg"
        shadow-intensity="1"
        ar
        ar-modes="webxr scene-viewer quick-look"
        style="position: relative;"
    >
        <span class="hint">ドラッグ: 回転 ／ ピンチ: ズーム</span>
    </model-viewer>
</body>
</html>
